<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Form5472 Prep">
  <!-- Brand favicon: white "5472" on navy (#1e3a8a) rounded square.
       Designed for legibility at 16x16 — no fine details, generous letter-spacing,
       extra-bold weight, padding from edges. Matches the same #1e3a8a as the
       site accent color and Google Ads logo. -->
  <rect width="64" height="64" rx="11" fill="#1e3a8a"/>
  <text x="32" y="43"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="24"
        letter-spacing="-1"
        fill="#ffffff">5472</text>
</svg>
