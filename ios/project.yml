name: Form5472Admin
options:
  bundleIdPrefix: com.form5472prep
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
packages:
  AdminKit:
    path: AdminKit
targets:
  Form5472Admin:
    type: application
    platform: iOS
    productName: F5472 Admin
    deploymentTarget: "17.0"
    sources:
      - path: Form5472Admin
    dependencies:
      - package: AdminKit
        product: AdminKit
    info:
      path: Form5472Admin/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Form5472Admin/Form5472Admin.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.form5472prep.admin
        PRODUCT_NAME: F5472 Admin
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LU9X3H78Y4
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
schemes:
  Form5472Admin:
    build:
      targets:
        Form5472Admin: all
    run:
      config: Debug
    archive:
      config: Release
