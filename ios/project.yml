name: Form5472Admin
options:
  bundleIdPrefix: com.form5472prep
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
packages:
  AdminKit:
    path: AdminKit
targets:
  Form5472Admin:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Form5472Admin
    dependencies:
      - package: AdminKit
        product: AdminKit
    info:
      path: Form5472Admin/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.form5472prep.admin
        PRODUCT_NAME: F5472 Admin
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  Form5472Admin:
    build:
      targets:
        Form5472Admin: all
    run:
      config: Debug
    archive:
      config: Release
